<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NERV Heroines Webtoon · 에피소드 목록</title>
<meta name="description" content="메타 코미디 4컷 연재 — 매 6시간마다 자동 발행되는 NERV 시스템 7 캐릭터 4컷 웹툰.">
<meta property="og:title" content="NERV Heroines Webtoon">
<meta property="og:description" content="메타 코미디 4컷 연재">
<meta property="og:type" content="website">
<link rel="stylesheet" href="static/style.css">
</head>
<body>
<header class="site-header">
  <a href="index.html" class="brand">
    <span class="brand-logo">◆ NERV</span>
    <span class="brand-title">HEROINES WEBTOON</span>
  </a>
  <nav class="site-nav">
    <a href="index.html">목록</a>
<a href="ep/1.html">최신화</a>    <a href="ep/1.html">1화부터</a>
  </nav>
</header>

<main class="site-main">
<section class="hero">
  <h1 class="hero-title">NERV Heroines Webtoon</h1>
  <p class="hero-sub">메타 코미디 4컷 연재 · 총 <strong>1</strong>화</p>
  <div class="sort-toggle" role="group" aria-label="정렬">
    <button class="sort-btn active" data-sort="desc" aria-pressed="true">🆕 최신순</button>
    <button class="sort-btn" data-sort="asc" aria-pressed="false">1️⃣ 1화부터</button>
  </div>
</section>

<section class="episode-grid" id="episode-grid">
  <a class="ep-card" href="ep/1.html" data-num="1">
    <div class="ep-thumb">
      <img src="images/ep0001_2026-05-09.png" alt="Ep.1 0.91의 밤" loading="lazy">
      <span class="ep-badge">EP.001</span>
    </div>
    <div class="ep-info">
      <h2 class="ep-title">0.91의 밤</h2>
      <p class="ep-synopsis">카오루가 IRB 결과 대기 중 arXiv 추천 작업을 묵묵히 이어가며, 숫자 속에서 작은 평온을 찾는다</p>
      <div class="ep-meta">
        <span class="ep-date">2026-05-09</span>
        <span class="ep-cast">
            <span class="cast-chip" style="--chip-color: #9370DB">
              <span class="chip-dot"></span>🔍 나기사 카오루
            </span>
        </span>
      </div>
    </div>
  </a>
</section>

<script>
  (function () {
    const grid = document.getElementById('episode-grid');
    const buttons = document.querySelectorAll('.sort-btn');
    function applySort(direction) {
      const cards = Array.from(grid.querySelectorAll('.ep-card'));
      cards.sort((a, b) => {
        const na = parseInt(a.dataset.num, 10);
        const nb = parseInt(b.dataset.num, 10);
        return direction === 'asc' ? na - nb : nb - na;
      });
      cards.forEach((c) => grid.appendChild(c));
    }
    buttons.forEach((btn) => {
      btn.addEventListener('click', () => {
        buttons.forEach((b) => { b.classList.remove('active'); b.setAttribute('aria-pressed', 'false'); });
        btn.classList.add('active');
        btn.setAttribute('aria-pressed', 'true');
        applySort(btn.dataset.sort);
      });
    });
  })();
</script>
</main>

<footer class="site-footer">
  <div class="footer-line">
    <span class="footer-brand">NERV · RESEARCH</span>
    <span class="footer-meta">총 1화 · 6시간 간격 자동 연재 · MAGI 작가단 집필</span>
  </div>
  <div class="footer-meta-small">
    Built 2026-05-09 21:03 KST
  </div>
</footer>
</body>
</html>
